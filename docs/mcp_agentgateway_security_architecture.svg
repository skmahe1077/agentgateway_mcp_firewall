<svg width="680" height="468" viewBox="0 0 680 468" xmlns="http://www.w3.org/2000/svg" font-family="monospace, 'Courier New'" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'Inter', sans-serif; fill: #1a1a2e; }
      .th { font-size: 13px; font-weight: 600; }
      .ts { font-size: 11.5px; font-weight: 400; }

      /* kagent - purple */
      .box-kagent rect { fill: #EEEDFE; stroke: #534AB7; }
      .box-kagent .th { fill: #3C3489; }
      .box-kagent .ts { fill: #534AB7; }

      /* Agent - gray */
      .box-agent rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .box-agent .th { fill: #444441; }
      .box-agent .ts { fill: #5F5E5A; }

      /* agentgateway - blue */
      .box-gateway rect { fill: #E6F1FB; stroke: #185FA5; }
      .box-gateway .th { fill: #0C447C; }
      .box-gateway .ts { fill: #185FA5; }
      .box-gateway line { stroke: #378ADD; }

      /* MCP Firewall - coral */
      .box-firewall rect { fill: #FAECE7; stroke: #993C1D; }
      .box-firewall .th { fill: #712B13; }
      .box-firewall .ts { fill: #993C1D; }
      .box-firewall line { stroke: #D85A30; }

      /* Upstream - teal */
      .box-upstream rect { fill: #E1F5EE; stroke: #0F6E56; }
      .box-upstream .th { fill: #085041; }
      .box-upstream .ts { fill: #0F6E56; }

      /* Connector arrows */
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .arr-dashed { stroke: #185FA5; stroke-width: 1.2; fill: none; stroke-dasharray: 4 2; }
      .label { fill: #5F5E5A; font-size: 11px; }
      .sep { stroke-width: 0.5; stroke-opacity: 0.45; fill: none; }
      .sep-dashed { stroke-width: 0.5; stroke-opacity: 0.4; fill: none; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- ── kagent Security Auditor ── -->
  <g class="box-kagent">
    <rect x="188" y="26" width="304" height="82" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="51" text-anchor="middle" dominant-baseline="central">kagent Security Auditor</text>
    <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">Kubernetes AI Agent</text>
    <text class="ts" x="340" y="86" text-anchor="middle" dominant-baseline="central" font-style="italic">"Scan server X for poisoning attacks"</text>
  </g>

  <!-- Down arrow + label -->
  <line x1="340" y1="108" x2="340" y2="162" class="arr" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="352" y="140" dominant-baseline="central">uses MCP tools (via agentgateway)</text>

  <!-- ── Agent (Client) ── -->
  <g class="box-agent">
    <rect x="30" y="168" width="66" height="252" rx="6" stroke-width="0.5"/>
    <text class="th" x="63" y="272" text-anchor="middle" dominant-baseline="central">Agent</text>
    <text class="ts" x="63" y="290" text-anchor="middle" dominant-baseline="central">(Client)</text>
  </g>

  <!-- Arrow: Agent → agentgateway -->
  <line x1="96" y1="290" x2="116" y2="290" class="arr" marker-end="url(#arrow)"/>

  <!-- ── agentgateway GOVERNANCE LAYER ── -->
  <g class="box-gateway">
    <rect x="116" y="168" width="202" height="252" rx="6" stroke-width="0.5"/>
    <text class="th" x="217" y="186" text-anchor="middle" dominant-baseline="central">agentgateway</text>
    <text class="ts" x="217" y="203" text-anchor="middle" dominant-baseline="central">GOVERNANCE LAYER</text>
    <line x1="124" y1="215" x2="310" y2="215" class="sep"/>
    <text class="ts" x="126" y="233" dominant-baseline="central">1.  MCP AuthN (JWT/OAuth)</text>
    <text class="ts" x="126" y="253" dominant-baseline="central">2.  MCP AuthZ (CEL RBAC)</text>
    <text class="ts" x="126" y="273" dominant-baseline="central">3.  Rate limiting</text>
    <text class="ts" x="126" y="293" dominant-baseline="central">4.  Access logging</text>
    <text class="ts" x="126" y="313" dominant-baseline="central">5.  Identity forwarding</text>
    <text class="ts" x="139" y="329" dominant-baseline="central">(X-Agentgateway-*)</text>
    <line x1="124" y1="342" x2="310" y2="342" class="sep-dashed"/>
    <text class="ts" x="126" y="358" dominant-baseline="central">Admin UI   (:15000)</text>
    <text class="ts" x="126" y="378" dominant-baseline="central">Metrics    (:15020)</text>
  </g>

  <!-- Dashed arrow: Identity forwarding → MCP Firewall -->
  <line x1="318" y1="313" x2="338" y2="313" class="arr-dashed" marker-end="url(#arrow)"/>

  <!-- ── MCP Tool Firewall SECURITY LAYER ── -->
  <g class="box-firewall">
    <rect x="338" y="168" width="183" height="252" rx="6" stroke-width="0.5"/>
    <text class="th" x="429" y="186" text-anchor="middle" dominant-baseline="central">MCP Tool Firewall</text>
    <text class="ts" x="429" y="203" text-anchor="middle" dominant-baseline="central">SECURITY LAYER</text>
    <line x1="346" y1="215" x2="513" y2="215" class="sep"/>
    <text class="ts" x="348" y="233" dominant-baseline="central">6.   9 detectors (8+LLM)</text>
    <text class="ts" x="348" y="253" dominant-baseline="central">7.   Risk scoring</text>
    <text class="ts" x="348" y="273" dominant-baseline="central">8.   Policy engine</text>
    <text class="ts" x="348" y="293" dominant-baseline="central">9.   Response scanning</text>
    <text class="ts" x="348" y="313" dominant-baseline="central">10.  Kill switch</text>
    <text class="ts" x="348" y="333" dominant-baseline="central">11.  Gateway lockdown</text>
    <text class="ts" x="348" y="353" dominant-baseline="central">12.  Prometheus metrics</text>
    <text class="ts" x="348" y="373" dominant-baseline="central">13.  Identity-aware</text>
    <text class="ts" x="362" y="391" dominant-baseline="central">audit logging</text>
  </g>

  <!-- Arrow: MCP Firewall → Upstream -->
  <line x1="521" y1="290" x2="541" y2="290" class="arr" marker-end="url(#arrow)"/>

  <!-- ── Upstream MCP Server ── -->
  <g class="box-upstream">
    <rect x="541" y="168" width="109" height="252" rx="6" stroke-width="0.5"/>
    <text class="th" x="595" y="255" text-anchor="middle" dominant-baseline="central">Upstream</text>
    <text class="th" x="595" y="273" text-anchor="middle" dominant-baseline="central">MCP Server</text>
    <text class="ts" x="595" y="309" text-anchor="middle" dominant-baseline="central">(deployed via</text>
    <text class="ts" x="595" y="327" text-anchor="middle" dominant-baseline="central">kmcp CRD)</text>
  </g>

</svg>
